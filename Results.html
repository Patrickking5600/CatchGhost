<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Report | Catch Ghost</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghost-cyan: #00ffff;
            --ghost-red: #ff3131;
            --obsidian: #0b0d0f;
            --card-bg: #161b22;
            --text-main: #e6edf3;
        }
        body { background-color: var(--obsidian); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 90%; max-width: 500px; padding: 30px 20px; display: flex; align-items: center; gap: 15px; }
        .brand-logo { width: 150px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); }
        .status-bar { width: 90%; max-width: 500px; padding: 15px; border-radius: 8px; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--ghost-cyan); margin-bottom: 20px; text-align: center; font-size: 0.9rem; color: var(--ghost-cyan); letter-spacing: 1px; }
        .feed-container { width: 95%; max-width: 500px; }
        .interaction-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 15px; padding: 20px; border-left: 4px solid var(--ghost-cyan); }
        
        /* New Styles for AI Intelligence Box */
        .ai-intelligence-box { background: rgba(0, 255, 255, 0.05); border: 1px solid var(--ghost-cyan); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .ai-header { color: var(--ghost-cyan); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ai-content { font-size: 0.9rem; color: #e6edf3; line-height: 1.6; white-space: pre-wrap; }
        
        .user-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px;}
        .stars { color: var(--ghost-cyan); font-size: 0.8rem; margin-bottom: 10px;}
        .review-text { font-size: 0.9rem; color: #8b949e; line-height: 1.4; }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Catch Ghost Logo" class="brand-logo"></header>
    <div class="status-bar" id="statusBox">GHOST ANALYSIS IN PROGRESS...</div>
    <div class="feed-container" id="resultsFeed"></div>

    <script>
        const resultsFeed = document.getElementById('resultsFeed');
        const statusBox = document.getElementById('statusBox');
        const urlParams = new URLSearchParams(window.location.search);
        
        // We are now using placeId (businessId) for precision
        const placeId = urlParams.get('place_id'); 

        async function fetchGhostData() {
            if(!placeId) { 
                statusBox.innerText = "ERROR: NO PLACE ID PROVIDED"; 
                return; 
            }
            
            // POINTING TO YOUR NEW MODULAR SECRETARY
            const SECRETARY_URL = "https://us-central1-catchghostai.cloudfunctions.net/scoutBusiness";

            try {
                const response = await fetch(`${SECRETARY_URL}?businessId=${placeId}&industryType=bar`);
                const responseJson = await response.json();

                if (responseJson.success && responseJson.data) {
                    const ai = responseJson.data; // This is the 'analysis' object from Gemini
                    statusBox.innerText = `GHOST REPORT GENERATED`;
                    resultsFeed.innerHTML = "";

                    // 1. Render the Modular Intelligence Report
                    resultsFeed.innerHTML += `
                        <div class="ai-intelligence-box">
                            <div class="ai-header">⚡ Executive Summary</div>
                            <div class="ai-content">${ai.executive_summary}</div>
                            
                            <div class="ai-header" style="margin-top:20px; color:var(--ghost-red);">⚠️ Liability & Risk</div>
                            <div class="ai-content">${Array.isArray(ai.liability_report.operational_risks) ? ai.liability_report.operational_risks.join('<br>') : ai.liability_report}</div>
                            
                            <div class="ai-header" style="margin-top:20px;">📈 SEO Opportunities</div>
                            <div class="ai-content">${ai.seo_report.keyword_suggestions ? ai.seo_report.keyword_suggestions.join(', ') : 'Check dashboard for full details'}</div>
                        </div>
                    `;

                    // 2. Add a status update for the rating
                    statusBox.innerText = `SCORE: ${ai.average_rating} / 5 | LATEST: ${new Date(ai.latest_review_date).toLocaleDateString()}`;

                } else { 
                    statusBox.innerText = "NO DATA FOUND IN CLOUD"; 
                }
            } catch (error) { 
                statusBox.innerText = "HUNT ERROR: CONNECTION FAILED"; 
                console.error("Fetch Error:", error);
            }
        }

        fetchGhostData();
    </script>
</body>
</html>
