<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Report | Catch Ghost</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghost-cyan: #00ffff;
            --ghost-red: #ff3131;
            --obsidian: #0b0d0f;
            --card-bg: #161b22;
            --text-main: #e6edf3;
        }
        body { background-color: var(--obsidian); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 90%; max-width: 500px; padding: 30px 20px; display: flex; align-items: center; gap: 15px; }
        .brand-logo { width: 150px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); }
        .status-bar { width: 90%; max-width: 500px; padding: 15px; border-radius: 8px; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--ghost-cyan); margin-bottom: 20px; text-align: center; font-size: 0.9rem; color: var(--ghost-cyan); letter-spacing: 1px; }
        .feed-container { width: 95%; max-width: 500px; }
        .interaction-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 15px; padding: 20px; border-left: 4px solid var(--ghost-cyan); }
        .user-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px;}
        .stars { color: var(--ghost-cyan); font-size: 0.8rem; margin-bottom: 10px;}
        .review-text { font-size: 0.9rem; color: #8b949e; line-height: 1.4; }
        .ghost-strategy { background: rgba(0, 255, 255, 0.05); border-radius: 8px; padding: 15px; margin-top: 15px; border: 1px solid rgba(0, 255, 255, 0.1); }
        .strategy-label { font-size: 0.7rem; color: var(--ghost-cyan); font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <header><img src="logo.png" alt="Catch Ghost Logo" class="brand-logo"></header>
    <div class="status-bar" id="statusBox">GHOST ANALYSIS IN PROGRESS...</div>
    <div class="feed-container" id="resultsFeed"></div>
    <script>
        const resultsFeed = document.getElementById('resultsFeed');
        const statusBox = document.getElementById('statusBox');
        const urlParams = new URLSearchParams(window.location.search);
        const bizName = urlParams.get('name');
        const bizAddr = urlParams.get('addr');

        async function fetchGhostData() {
            if(!bizName || !bizAddr) { statusBox.innerText = "ERROR: NO BUSINESS DATA FOUND"; return; }
            
            // PASTE YOUR SECRETARY TRIGGER URL BELOW
            const SECRETARY_URL = "https://scoutbusiness-mvsj2hf6tq-uc.a.run.app";

            try {
                const response = await fetch(`${SECRETARY_URL}?name=${encodeURIComponent(bizName)}&address=${encodeURIComponent(bizAddr)}`);
                const data = await response.json();
                if (data.reviews && data.reviews.length > 0) {
                    statusBox.innerText = `REPORT FOR: ${data.business.toUpperCase()}`;
                    resultsFeed.innerHTML = "";
                    data.reviews.forEach(review => {
                        resultsFeed.innerHTML += `
                            <div class="interaction-card">
                                <div class="user-name">${review.author_name}</div>
                                <div class="stars">${"★".repeat(review.rating)}</div>
                                <div class="review-text">${review.text}</div>
                                <div class="ghost-strategy">
                                    <div class="strategy-label">Ghost Intelligence Strategy</div>
                                    <div style="font-size: 0.8rem; color: white;">Automation triggered for this review.</div>
                                </div>
                            </div>`;
                    });
                } else { statusBox.innerText = "NO REVIEWS FOUND"; }
            } catch (error) { statusBox.innerText = "HUNT ERROR"; }
        }
        fetchGhostData();
    </script>
</body>
</html>
