<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Ghost | Intelligence Portal</title>
    <style>
   <style>
  .logo {
    font-family: 'JetBrains Mono', monospace; /* Check these quotes! */
    font-weight: 800;
    font-size: 1.5rem;
    color: #fff;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    letter-spacing: -2px;
  }
  .logo-ghost {
    color: #38bdf8;
    opacity: 0.7;
  }
</style>
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">👻 CATCH GHOST</div>
        <p>Real-Time Reputation Scouting</p>
    </div>

    <div class="container" id="ghost-feed">
        <p style="text-align:center;">Connecting to Ghost database...</p>
    </div>

    <script>
       
        const API_URL = "https://script.google.com/macros/s/AKfycbwCQf1wcf7wBZu-0YDlStnOQ1l90Jzxo8WJJleD1ApFSqcqksFiyNLszbenwik2BKnH/exec";

        async function fetchScouts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const feed = document.getElementById('ghost-feed');
                feed.innerHTML = ''; 

                data.forEach(item => {
                    feed.innerHTML += `
                        <div class="card">
                            <div class="meta">${item.date} | ${"★".repeat(item.rating)}${"☆".repeat(5 - item.rating)}</div>
                            <div class="review">"${item.review}"</div>
                            <div class="strategy">
                                <label>Ghost Intelligence Strategy</label>
                                ${item.aiContent.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('ghost-feed').innerHTML = "Error loading intelligence feed.";
            }
        }
        fetchScouts();
    </script>
</body>
</html>
