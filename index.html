<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Ghost | Intelligence Portal</title>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid #1e293b; }
        .logo { font-size: 2rem; color: #38bdf8; font-weight: bold; }
        .container { max-width: 800px; margin: 40px auto; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #38bdf8; }
        .meta { color: #94a3b8; font-size: 0.8rem; margin-bottom: 10px; }
        .strategy { background: #0f172a; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; border: 1px solid #334155; }
        .strategy label { color: #38bdf8; font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">👻 CATCH GHOST</div>
        <p>Real-Time Reputation Scouting</p>
    </div>

    <div class="container" id="ghost-feed">
        <p style="text-align:center;">Connecting to Ghost database...</p>
    </div>

    <script>
       
        const API_URL = "https://script.google.com/macros/s/AKfycbwCQf1wcf7wBZu-0YDlStnOQ1l90Jzxo8WJJleD1ApFSqcqksFiyNLszbenwik2BKnH/exec";

        async function fetchScouts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const feed = document.getElementById('ghost-feed');
                feed.innerHTML = ''; 

                data.forEach(item => {
                    feed.innerHTML += `
                        <div class="card">
                            <div class="meta">${item.date} | ${item.rating} Stars</div>
                            <div class="review">"${item.review}"</div>
                            <div class="strategy">
                                <label>Ghost Intelligence Strategy</label>
                                ${item.aiContent.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('ghost-feed').innerHTML = "Error loading intelligence feed.";
            }
        }
        fetchScouts();
    </script>
</body>
</html>
