<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Ghost | Small Business Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghost-cyan: #00ffff;
            --ghost-red: #ff3131;
            --obsidian: #0b0d0f;
            --card-bg: #161b22;
            --text-main: #e6edf3;
        }

        body {
            background-color: var(--obsidian);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 90%;
            max-width: 500px;
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
        }

        .brand-logo {
            width: 150px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.3;
            max-width: 150px;
        }

        .hero-action-container {
            width: 90%;
            max-width: 500px;
            padding: 10px 0 30px 0;
        }

        .animated-scout-btn {
            position: relative;
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .btn-video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: brightness(0.6);
        }

        .btn-text {
            position: relative;
            z-index: 2;
            color: var(--ghost-cyan);
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .feed-container {
            width: 95%;
            max-width: 500px;
            padding-bottom: 50px;
        }

        .interaction-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 20px;
            cursor: pointer;
            border-left: 4px solid var(--ghost-cyan);
            transition: 0.3s;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .user-name { font-weight: bold; font-size: 0.9rem; }
        .stars { color: var(--ghost-cyan); font-size: 0.8rem; }

        .review-text {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #8b949e;
        }

        .ghost-strategy {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .strategy-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--ghost-cyan);
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Catch Ghost Logo" class="brand-logo">
        <h1>Small Business Automation</h1>
    </header>

    <div class="hero-action-container">
        <button class="animated-scout-btn" id="scoutBtn">
            <video autoplay loop muted playsinline class="btn-video-bg">
                <source src="Animation_Generation_and_Delivery.mp4" type="video/mp4">
            </video>
            <span class="btn-text" id="btnText">SCOUT MY BUSINESS</span>
        </button>
    </div>

    <div class="feed-container" id="resultsFeed">
        </div>

    <script>
        const scoutBtn = document.getElementById('scoutBtn');
        const btnText = document.getElementById('btnText');
        const resultsFeed = document.getElementById('resultsFeed');

        // PASTE YOUR URL BETWEEN THE QUOTES BELOW
        const SECRETARY_URL = "https://us-central1-catchghostai.cloudfunctions.net/scoutBusiness";

        scoutBtn.addEventListener('click', async () => {
            btnText.innerText = "SCOUTING...";
            
            try {
                // Testing with a default business (Starbucks) for now
                const response = await fetch(`${SECRETARY_URL}?businessName=Starbucks&address=Seattle`);
                const data = await response.json();

                if (data.reviews) {
                    btnText.innerText = "SCOUT COMPLETE";
                    
                    // Clear old examples and show the first live review found
                    resultsFeed.innerHTML = `
                        <div class="interaction-card">
                            <div class="card-header">
                                <div class="user-name">${data.reviews[0].author_name}</div>
                                <div class="stars">★★★★★</div>
                            </div>
                            <div class="review-text">${data.reviews[0].text}</div>
                            <div class="ghost-strategy">
                                <div class="strategy-label">Ghost Intelligence Strategy</div>
                                <div style="font-size: 0.8rem; color: white;">
                                    <strong>Status:</strong> Successfully pulled from ${data.business}.
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                btnText.innerText = "SCOUT ERROR";
            }
        });
    </script>
</body>
</html>
