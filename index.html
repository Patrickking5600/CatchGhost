<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Ghost | Small Business Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghost-cyan: #00ffff;
            --ghost-red: #ff3131;
            --obsidian: #0b0d0f;
            --card-bg: #161b22;
            --text-main: #e6edf3;
            --input-bg: #0d1117;
        }

        body {
            background-color: var(--obsidian);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 90%; max-width: 500px;
            padding: 30px 20px;
            display: flex; align-items: center; gap: 15px;
        }

        .brand-logo { width: 150px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); }
        h1 { font-size: 1.1rem; max-width: 150px; }

        .hero-action-container {
            width: 90%; max-width: 500px;
            padding: 10px 0 30px 0;
            min-height: 100px;
        }

        .animated-scout-btn {
            position: relative; width: 100%; height: 80px;
            border: none; border-radius: 12px; cursor: pointer;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            background: #000; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        .btn-video-bg {
            position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
            object-fit: cover; transform: translate(-50%, -50%);
            z-index: 1; filter: brightness(0.6);
        }

        .btn-text {
            position: relative; z-index: 2; color: var(--ghost-cyan);
            font-weight: bold; font-size: 1.1rem; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        #inputSuite {
            display: none; flex-direction: column; gap: 12px;
        }

        .ghost-input {
            background: var(--input-bg); border: 1px solid #30363d;
            border-radius: 8px; padding: 15px; color: white; outline: none; font-size: 1rem;
        }

        .hunt-btn {
            background: var(--ghost-cyan); color: black; font-weight: bold;
            border: none; border-radius: 8px; padding: 15px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .feed-container { width: 95%; max-width: 500px; }
        .interaction-card {
            background: var(--card-bg); border-radius: 12px;
            margin-bottom: 15px; padding: 20px; border-left: 4px solid var(--ghost-cyan);
        }
        .card-1star { border-left-color: var(--ghost-red); }
        .user-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px;}
        .stars { color: var(--ghost-cyan); font-size: 0.8rem; margin-bottom: 10px;}
        .review-text { font-size: 0.9rem; color: #8b949e; line-height: 1.4; }
        
        .ghost-strategy {
            background: rgba(0, 255, 255, 0.05); border-radius: 8px;
            padding: 15px; margin-top: 15px; border: 1px solid rgba(0, 255, 255, 0.1);
        }
        .strategy-label { font-size: 0.7rem; color: var(--ghost-cyan); font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Catch Ghost Logo" class="brand-logo">
        <h1>Small Business Automation</h1>
    </header>

    <div class="hero-action-container">
        <button class="animated-scout-btn" id="initialBtn">
            <video autoplay loop muted playsinline class="btn-video-bg">
                <source src="Animation_Generation_and_Delivery.mp4" type="video/mp4">
            </video>
            <span class="btn-text">SCOUT MY BUSINESS</span>
        </button>

        <div id="inputSuite">
            <input type="text" id="bizName" class="ghost-input" placeholder="Business Name">
            <input type="text" id="bizAddress" class="ghost-input" placeholder="City or Zip Code">
            <button class="hunt-btn" id="jumpBtn">Start The Hunt</button>
        </div>
    </div>

    <div class="feed-container">
        <div class="interaction-card">
            <div class="user-name">Sarah Jenkins</div>
            <div class="stars">★★★★★</div>
            <div class="review-text">The service at Wynyard Starbucks today was exceptional. Thank you Sasi!</div>
            <div class="ghost-strategy">
                <div class="strategy-label">Ghost Intelligence</div>
                <div style="font-size: 0.8rem;">Example Review Analysis</div>
            </div>
        </div>
        <div class="interaction-card card-1star">
            <div class="user-name">Mark Thompson</div>
            <div class="stars" style="color:var(--ghost-red)">★☆☆☆☆</div>
            <div class="review-text">Waited 20 minutes for a cold latte. Staff was uninterested.</div>
        </div>
    </div>

    <script>
        const initialBtn = document.getElementById('initialBtn');
        const inputSuite = document.getElementById('inputSuite');
        const jumpBtn = document.getElementById('jumpBtn');

        initialBtn.addEventListener('click', () => {
            initialBtn.style.display = "none";
            inputSuite.style.display = "flex";
        });

        jumpBtn.addEventListener('click', () => {
            const name = document.getElementById('bizName').value;
            const addr = document.getElementById('bizAddress').value;
            if(name && addr) {
                window.location.href = `results.html?name=${encodeURIComponent(name)}&addr=${encodeURIComponent(addr)}`;
            } else {
                alert("The Ghost needs a Name and Address to begin.");
            }
        });
    </script>
</body>
</html>
