<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Ghost | Small Business Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghost-cyan: #00ffff;
            --obsidian: #0b0d0f;
            --card-bg: #161b22;
            --text-main: #e6edf3;
            --input-bg: #0d1117;
        }
        body { background-color: var(--obsidian); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 90%; max-width: 500px; padding: 30px 20px; display: flex; align-items: center; gap: 15px; }
        .brand-logo { width: 150px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); }
        .hero-action-container { width: 90%; max-width: 500px; padding: 10px 0 30px 0; min-height: 100px; }
        .animated-scout-btn { position: relative; width: 100%; height: 80px; border: none; border-radius: 12px; cursor: pointer; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); }
        .btn-video-bg { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); z-index: 1; filter: brightness(0.6); }
        .btn-text { position: relative; z-index: 2; color: var(--ghost-cyan); font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 0, 0, 1); }
        #inputSuite { display: none; flex-direction: column; gap: 12px; }
        .ghost-input { background: var(--input-bg); border: 1px solid #30363d; border-radius: 8px; padding: 15px; color: white; outline: none; font-size: 1rem; }
        .hunt-btn { background: var(--ghost-cyan); color: black; font-weight: bold; border: none; border-radius: 8px; padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        /* Style for the Google Dropdown list */
        .pac-container { background-color: var(--card-bg); border: 1px solid var(--ghost-cyan); border-radius: 8px; color: white; font-family: 'Inter', sans-serif; }
        .pac-item { color: #8b949e; border-top: 1px solid #30363d; padding: 10px; cursor: pointer; }
        .pac-item:hover { background-color: #1c2128; }
        .pac-item-query { color: var(--ghost-cyan); }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Catch Ghost Logo" class="brand-logo">
        <h1>Small Business Automation</h1>
    </header>

    <div class="hero-action-container">
        <button class="animated-scout-btn" id="initialBtn">
            <video autoplay loop muted playsinline class="btn-video-bg">
                <source src="Animation_Generation_and_Delivery.mp4" type="video/mp4">
            </video>
            <span class="btn-text">SCOUT MY BUSINESS</span>
        </button>

        <div id="inputSuite">
            <input type="text" id="bizName" class="ghost-input" placeholder="Start typing business name...">
            <input type="text" id="bizAddress" class="ghost-input" placeholder="Address will auto-fill">
            <button class="hunt-btn" id="jumpBtn">Start The Hunt</button>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCLjjr5-BN_sa3ul_clgWJY-Z6VuhHnlys&libraries=places"></script>

    <script>
        window.onload = function() {
            const initialBtn = document.getElementById('initialBtn');
            const inputSuite = document.getElementById('inputSuite');
            const jumpBtn = document.getElementById('jumpBtn');
            const bizNameInput = document.getElementById('bizName');
            const bizAddressInput = document.getElementById('bizAddress');

            let selectedPlaceId = null; 

            // Initialize Autocomplete
            if (typeof google !== 'undefined') {
                const autocomplete = new google.maps.places.Autocomplete(bizNameInput, {
                    types: ['establishment'],
                    fields: ['place_id', 'name', 'formatted_address']
                });

                autocomplete.addListener('place_changed', () => {
                    const place = autocomplete.getPlace();
                    if (place.place_id) {
                        selectedPlaceId = place.place_id;
                        bizAddressInput.value = place.formatted_address;
                    }
                });
            }

            // Reveal Search UI
            initialBtn.addEventListener('click', () => {
                initialBtn.style.display = "none";
                inputSuite.style.display = "flex";
            });

            // Jump to Results
            jumpBtn.addEventListener('click', () => {
                const name = bizNameInput.value;
                if(selectedPlaceId) {
                    window.location.href = `Results.html?place_id=${selectedPlaceId}`;
                } else if (name) {
                    window.location.href = `Results.html?name=${encodeURIComponent(name)}`;
                } else {
                    alert("Please select a business from the dropdown.");
                }
            });
        };
    </script>
</body>
</html>
